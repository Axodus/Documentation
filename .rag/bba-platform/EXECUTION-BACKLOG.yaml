backlog_version: "1.0.0"
program:
  id: "PROGRAM-BBA-DOC"
  name: "BBA Platform Documentation"
  status: "PLANNED"
  epics:
    - id: "EPIC-000"
      name: "Documentation Foundation"
      documentation_areas: ["AREA-000"]
      sprints:
        - id: "SPRINT-00"
          name: "Foundation and Master Backlog"
          status: "READY"
          requests:
            - id: "REQ-000-001"
              title: "Create Foundation Manifest"
              produces: ["BBA-DOC-FOUNDATION-MANIFEST"]
              acceptance: ["Manifest lists required documents, read order, schema minimum, and deterministic checksum scope."]
            - id: "REQ-000-002"
              title: "Create Documentation Strategy"
              produces: ["BBA-GDE-001"]
              acceptance: ["Strategy defines ownership, lifecycle, source-of-truth rules, and review responsibilities."]
            - id: "REQ-000-003"
              title: "Create Documentation Roadmap"
              produces: ["BBA-ROAD-002"]
              acceptance: ["Roadmap orders layers, areas, execution epics, sprints, and gates without conflating them."]
            - id: "REQ-000-004"
              title: "Create Migration Register"
              produces: ["BBA-REF-003"]
              acceptance: ["Existing BBA sources are classified with origin, destination, strategy, confidence, blockers, replacement, publication candidacy, and migration phase."]
            - id: "REQ-000-005"
              title: "Create Concept Map"
              produces: ["BBA-REF-001"]
              acceptance: ["Core relationships are represented without implementation terminology."]
            - id: "REQ-000-006"
              title: "Create Ubiquitous Language"
              produces: ["BBA-REF-002"]
              acceptance: ["Required terms contain canonical name, definition, motivation, aliases, forbidden synonyms, related concepts, lifecycle, examples, and non-examples."]
            - id: "REQ-000-007"
              title: "Create Foundation ADRs"
              produces: ["BBA-ADR-0001", "BBA-ADR-0002", "BBA-ADR-0003", "BBA-ADR-0004"]
              acceptance: ["Four proposed ADRs record Source of Truth, Mission, tenant neutrality, and domain-before-architecture decisions."]
            - id: "REQ-000-008"
              title: "Create Decision Traceability Matrix"
              produces: ["BBA-STD-001"]
              acceptance: ["Matrix supports Vision to Principle to Area to Epic to Sprint to REQ to artifact to implementation to tests."]
            - id: "REQ-000-009"
              title: "Create Dependency Manifest"
              produces: ["BBA-DOC-DEPENDENCY-GRAPH"]
              acceptance: ["Typed dependencies are explicit and cycles are detectable."]
            - id: "REQ-000-010"
              title: "Create Public Private Boundary"
              produces: ["BBA-POL-001"]
              acceptance: ["Private, public, prohibited, derived, and sanitization rules are explicit."]
            - id: "REQ-000-011"
              title: "Create Quality Standards"
              produces: ["BBA-STD-002"]
              acceptance: ["Definition of Ready, Definition of Done, completeness, consistency, traceability, review, and publication criteria are defined."]
            - id: "REQ-000-012"
              title: "Add Foundation Validation"
              produces: ["BBA-FOUNDATION-VALIDATION"]
              acceptance: ["Automated tests validate manifest, layer/area counts, execution hierarchy, IDs, dependencies, required files, and checksums."]
    - id: "EPIC-001"
      name: "Product Documentation Rollout"
      documentation_areas: ["AREA-001", "AREA-002", "AREA-003", "AREA-004", "AREA-005", "AREA-006", "AREA-007", "AREA-008", "AREA-009", "AREA-010"]
      status: "IN_PROGRESS"
      sprints:
        - id: "SPRINT-01"
          name: "Product Vision and Operating Model"
          status: "PASS_CLOSED"
          documentation_areas: ["AREA-001", "AREA-002", "AREA-004", "AREA-005", "AREA-006"]
          requests:
            - id: "REQ-001-01-001"
              title: "Define Product Vision"
              status: "DONE"
              produces: ["BBAPLT-GDE-001"]
              files: [".rag/bba-platform/product/BBAPLT-GDE-001-PRODUCT-VISION.md"]
              acceptance: ["Vision defines the platform purpose, consumers, principles, product value, and non-technical success boundary."]
            - id: "REQ-001-01-002"
              title: "Define Product Positioning"
              status: "DONE"
              depends_on: ["REQ-001-01-001"]
              produces: ["BBAPLT-GDE-002"]
              files: [".rag/bba-platform/product/BBAPLT-GDE-002-PRODUCT-POSITIONING.md"]
              acceptance: ["Positioning distinguishes BBA Platform from an Axodus-only agency, generic marketing service, and implementation vendor."]
            - id: "REQ-001-01-003"
              title: "Define Product Capabilities"
              status: "DONE"
              depends_on: ["REQ-001-01-001"]
              produces: ["BBAPLT-GDE-003"]
              files: [".rag/bba-platform/product/BBAPLT-GDE-003-CAPABILITIES.md"]
              acceptance: ["Capabilities are durable platform abilities and are separated from tenant-specific solutions and technical components."]
            - id: "REQ-001-01-004"
              title: "Define Product Operating Model"
              status: "DONE"
              depends_on: ["REQ-001-01-001", "REQ-001-01-003"]
              produces: ["BBAPLT-GDE-004"]
              files: [".rag/bba-platform/product/BBAPLT-GDE-004-OPERATING-MODEL.md"]
              acceptance: ["Operating model defines Mission, AI Workforce, Human Governance, Steward, dynamic workflow, and conceptual lifecycle without technical architecture."]
            - id: "REQ-001-01-005"
              title: "Define Product Boundaries and Non-Goals"
              status: "DONE"
              depends_on: ["REQ-001-01-001", "REQ-001-01-003"]
              produces: ["BBAPLT-POL-001"]
              files: [".rag/bba-platform/product/BBAPLT-POL-001-PRODUCT-BOUNDARIES.md"]
              acceptance: ["Boundaries identify core responsibilities, consumer responsibilities, exclusions, and claims the product must not make."]
            - id: "REQ-001-01-006"
              title: "Review Product Documentation Baseline"
              status: "DONE"
              depends_on: ["REQ-001-01-001", "REQ-001-01-002", "REQ-001-01-003", "REQ-001-01-004", "REQ-001-01-005"]
              produces: ["BBAPLT-RPT-001"]
              files: [".rag/bba-platform/product/BBAPLT-RPT-001-PRODUCT-BASELINE-REVIEW.md"]
              acceptance: ["Product documents use canonical language, contain no technical architecture decisions, and pass the product-layer review checklist."]
        - id: "SPRINT-02"
          name: "Product Domain Framing"
          status: "IN_PROGRESS"
          documentation_areas: ["AREA-001", "AREA-002", "AREA-004", "AREA-005", "AREA-006", "AREA-007", "AREA-008", "AREA-009", "AREA-010"]
          requests:
            - id: "REQ-001-02-001"
              title: "Define Product Personas and Governance Roles"
              status: "PLANNED"
              depends_on: ["REQ-001-01-006"]
              produces: ["BBAPLT-GDE-005"]
              files: [".rag/bba-platform/product/BBAPLT-GDE-005-PERSONAS-AND-GOVERNANCE-ROLES.md"]
              acceptance: ["Personas, Stewards, human governance roles, AI Workforce roles, and authority boundaries are defined with canonical terminology."]
            - id: "REQ-001-02-002"
              title: "Define Tenant and Consumer Model"
              status: "PLANNED"
              depends_on: ["REQ-001-02-001"]
              produces: ["BBAPLT-GDE-006"]
              files: [".rag/bba-platform/product/BBAPLT-GDE-006-TENANT-AND-CONSUMER-MODEL.md"]
              acceptance: ["Tenant, consumer, white-label, self-hosted, SaaS, and Axodus adapter relationships are product-defined without technical tenancy design."]
            - id: "REQ-001-02-003"
              title: "Define Mission-Centric Value Model"
              status: "PLANNED"
              depends_on: ["REQ-001-02-001", "REQ-001-02-002"]
              produces: ["BBAPLT-GDE-007"]
              files: [".rag/bba-platform/product/BBAPLT-GDE-007-MISSION-CENTRIC-VALUE-MODEL.md"]
              acceptance: ["Mission value, inputs, outputs, human outcomes, Institutional Assets, and learning outcomes are defined without implementation state machines."]
            - id: "REQ-001-02-004"
              title: "Define Solutions and Use Cases"
              status: "PLANNED"
              depends_on: ["REQ-001-01-003", "REQ-001-02-002", "REQ-001-02-003"]
              produces: ["BBAPLT-GDE-008"]
              files: [".rag/bba-platform/product/BBAPLT-GDE-008-SOLUTIONS-AND-USE-CASES.md"]
              acceptance: ["Solutions combine capabilities for tenant-neutral use cases and do not redefine the Core around Axodus."]
            - id: "REQ-001-02-005"
              title: "Define Institutional Asset Portfolio"
              status: "PLANNED"
              depends_on: ["REQ-001-02-003", "REQ-001-02-004"]
              produces: ["BBAPLT-GDE-009"]
              files: [".rag/bba-platform/product/BBAPLT-GDE-009-INSTITUTIONAL-ASSET-PORTFOLIO.md"]
              acceptance: ["Institutional Asset classes, ownership, lifecycle intent, review needs, and publication relationships are defined."]
            - id: "REQ-001-02-006"
              title: "Define Product Lifecycle and Success Outcomes"
              status: "PLANNED"
              depends_on: ["REQ-001-02-003", "REQ-001-02-005"]
              produces: ["BBAPLT-GDE-010"]
              files: [".rag/bba-platform/product/BBAPLT-GDE-010-PRODUCT-LIFECYCLE-AND-SUCCESS.md"]
              acceptance: ["Product lifecycle milestones, success outcomes, completion signals, limitations, and non-guaranteed metrics are defined."]
            - id: "REQ-001-02-007"
              title: "Execute Product Layer Canonical Review"
              status: "PLANNED"
              depends_on: ["REQ-001-02-001", "REQ-001-02-002", "REQ-001-02-003", "REQ-001-02-004", "REQ-001-02-005", "REQ-001-02-006"]
              produces: ["BBAPLT-RPT-002"]
              files: [".rag/bba-platform/product/BBAPLT-RPT-002-PRODUCT-DOMAIN-FRAMING-REVIEW.md"]
              acceptance: ["Canonical review records semantic consistency, explicit gaps, no technical leakage, and readiness or blockers for Domain Documentation Rollout."]
